name: Run Capture Classifier
# 5-minute polling cadence per ADR-009 §7.
# GitHub Actions free tier supports schedule down to 5-min granularity, which
# matches the Classifier's needs exactly. Each run is a single HTTP POST to a
# Vercel serverless endpoint that fires one pass of runOnePass().

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: # allow manual trigger from the Actions tab

concurrency:
  group: classifier
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger Classifier endpoint
        env:
          BASE_URL: ${{ secrets.CONSOLE_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${BASE_URL:-}" ] || [ -z "${CRON_SECRET:-}" ]; then
            echo "Missing CONSOLE_BASE_URL or CRON_SECRET secret" >&2
            exit 1
          fi
          curl -sS -X POST "$BASE_URL/api/operators/classifier" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            -d '{}' \
            --fail-with-body \
            --max-time 60
          echo
